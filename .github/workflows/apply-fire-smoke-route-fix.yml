name: Apply fire engineering features

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/apply-fire-smoke-route-fix.yml"
      - ".github/scripts/apply_fire_engineering_features.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply fire engineering and FDS CSV feature patch
        run: python .github/scripts/apply_fire_engineering_features.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sim/index.html sim/js/ui.js sim/js/simulation/core.js docs/fire_engineering_model_basis.md docs/fds_risk_sample.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add fire engineering FDS CSV risk model"
            git push
          fi
